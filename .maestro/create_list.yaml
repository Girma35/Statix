appId: host.exp.exponent # Assuming we test via Expo Go by default
---
- launchApp
# Assuming the user is already logged in for this flow
# Tap the "Create" tab at the bottom
- tapOn: "Create"
# Verify we are on the Create List screen
- assertVisible: "Start a New Journey"
# Tap on the list name input placeholder
- tapOn: "e.g., German Adjectives, SQL Basics..."
# Input the name of our new list
- inputText: "My First E2E List"
# Submit the form
- tapOn: "Create List  ➔"
# Verify that it routed to the new headlist detail screen (which has "+ Add Word")
- assertVisible: "+ Add Word"
